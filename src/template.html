<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>

    <style>
        .modal {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="app">
        <aside class="sidebar">
            <h1>Todo List</h1>

            <button id="add-project-btn">+ Add Project</button>

            <h2>Projects</h2>
            <ul id="project-list"></ul>
        </aside>

        <main class="main-content">
            <header class="project-header">
                <h2 id="current-project-title"></h2>
                <button id="add-todo-btn">+ Add Todo</button>
            </header>

            <section id="todo-list"></section>
        </main>
    </div>

    <div id="todo-modal" class="modal">
        <div class="modal-content">
            <h2 id="todo-modal-title">Add Todo</h2>

            <form id="todo-form">
                <input type="hidden" id="todo-id">

                <label for="todo-title">Title</label>
                <input type="text" id="todo-title" required>

                <label for="todo-description">Description</label>
                <textarea id="todo-description"></textarea>

                <label for="todo-due-date">Due date</label>
                <input type="date" id="todo-due-date">

                <label for="todo-priority">Priority</label>
                <select id="todo-priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>

                <div class="modal-actions">
                    <button type="button" id="cancel-todo-btn">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="project-modal" class="modal">
        <div class="modal-content">
            <h2 id="project-modal-title">Add Project</h2>

            <form id="project-form">
                <input type="hidden" id="project-id">

                <label for="project-name">Project name</label>
                <input type="text" id="project-name" required>

                <div class="modal-actions">
                    <button type="button" id="cancel-project-btn">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
